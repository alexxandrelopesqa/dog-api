name: Dog API Test Automation CI

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    name: Build, Test and Allure Report
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - name: Grant execute permission for Maven Wrapper
        run: chmod +x mvnw

      - name: Run tests
        run: ./mvnw --batch-mode --no-transfer-progress clean test -Ddog.api.maxResponseTimeMs=5000 -Ddog.api.slaAttempts=15

      - name: Checkout gh-pages for Allure history
        if: github.ref == 'refs/heads/main'
        continue-on-error: true
        uses: actions/checkout@v4
        with:
          ref: gh-pages
          path: gh-pages

      - name: Restore Allure history
        if: github.ref == 'refs/heads/main'
        shell: bash
        run: |
          if [ -d "gh-pages/history" ]; then
            mkdir -p target/allure-results/history
            cp -r gh-pages/history/. target/allure-results/history/
            echo "Allure history restored."
          else
            echo "No previous Allure history found (first run or branch not initialized)."
          fi

      - name: Generate Allure report
        run: ./mvnw --batch-mode --no-transfer-progress allure:report

      - name: Upload surefire reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: surefire-reports
          path: target/surefire-reports
          if-no-files-found: warn

      - name: Upload Allure results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-results
          path: target/allure-results
          if-no-files-found: warn

      - name: Upload Allure HTML report artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-report-html
          path: target/site/allure-maven-plugin
          if-no-files-found: warn

      - name: Upload GitHub Pages artifact
        if: github.ref == 'refs/heads/main'
        uses: actions/upload-pages-artifact@v4
        with:
          name: allure-pages
          path: target/site/allure-maven-plugin

  deploy-pages:
    name: Publish Allure to GitHub Pages
    needs: test
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
      contents: read
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Check if GitHub Pages is enabled
        id: pages_check
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          status_code=$(curl -s -o /tmp/pages.json -w "%{http_code}" \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${{ github.repository }}/pages")
          if [ "${status_code}" = "200" ]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
            echo "GitHub Pages is enabled for this repository."
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "::warning::GitHub Pages is not enabled. Enable it in Settings > Pages to publish the Allure report."
          fi

      - name: Deploy to GitHub Pages
        id: deployment
        if: steps.pages_check.outputs.enabled == 'true'
        uses: actions/deploy-pages@v5
        with:
          artifact_name: allure-pages

      - name: Skip deploy when GitHub Pages is disabled
        if: steps.pages_check.outputs.enabled != 'true'
        run: echo "Skipping GitHub Pages deployment because Pages is disabled."
