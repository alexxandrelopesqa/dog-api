name: API tests

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:
  schedule:
    # 08:00, 12:00 e 18:00 UTC todos os dias (cron do GitHub Actions é sempre UTC)
    - cron: "0 8,12,18 * * *"

permissions:
  contents: read

jobs:
  test:
    name: API tests (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Setup Java 17 with Maven cache
        uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9
        with:
          distribution: temurin
          java-version: "17"
          cache: maven

      - name: Grant execute permission for Maven Wrapper
        if: runner.os != 'Windows'
        run: chmod +x mvnw

      - name: Execute API test suite (Windows)
        if: runner.os == 'Windows'
        run: .\mvnw.cmd --% --batch-mode --no-transfer-progress clean test -Pregression -Ddog.api.maxResponseTimeMs=5000 -Dsurefire.rerunFailingTestsCount=1

      - name: Execute API test suite (Linux/macOS)
        if: runner.os != 'Windows'
        run: ./mvnw --batch-mode --no-transfer-progress clean test -Pregression -Ddog.api.maxResponseTimeMs=5000 -Dsurefire.rerunFailingTestsCount=1

      - name: Upload surefire reports
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: surefire-reports-${{ matrix.os }}
          path: target/surefire-reports
          if-no-files-found: warn

      - name: Upload Allure results
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: allure-results-${{ matrix.os }}
          path: target/allure-results
          if-no-files-found: warn

  allure-aggregate:
    name: Allure e gh-pages
    needs: test
    if: always()
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Setup Java 17 with Maven cache
        uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9
        with:
          distribution: temurin
          java-version: "17"
          cache: maven

      - name: Grant execute permission for Maven Wrapper
        run: chmod +x mvnw

      - name: Download Allure results artifact
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093
        with:
          name: allure-results-ubuntu-latest
          path: target/allure-results

      - name: Check if gh-pages branch exists
        id: gh_pages_check
        if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
        shell: bash
        run: |
          if git ls-remote --exit-code --heads "https://github.com/${{ github.repository }}.git" gh-pages >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
            echo "Sem branch gh-pages; history ignorada nesta execução."
          fi

      - name: Checkout gh-pages (history)
        if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request' && steps.gh_pages_check.outputs.exists == 'true'
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: gh-pages
          path: gh-pages

      - name: Copiar history para allure-results
        if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request' && steps.gh_pages_check.outputs.exists == 'true'
        shell: bash
        run: |
          if [ -d "gh-pages/history" ]; then
            mkdir -p target/allure-results/history
            cp -R gh-pages/history/. target/allure-results/history/
          fi

      - name: mvn allure:report
        run: ./mvnw --batch-mode --no-transfer-progress allure:report

      - name: Montar public/
        if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
        shell: bash
        run: |
          mkdir -p public
          if [ -d "gh-pages/runs" ]; then
            mkdir -p public/runs
            cp -R gh-pages/runs/. public/runs/
          fi
          cp -R target/site/allure-maven-plugin/. public/
          mkdir -p public/runs/${{ github.run_number }}
          cp -R target/site/allure-maven-plugin/. public/runs/${{ github.run_number }}/
          if [ -d "target/site/allure-maven-plugin/history" ]; then
            mkdir -p public/history
            cp -R target/site/allure-maven-plugin/history/. public/history/
          fi
          touch public/.nojekyll
          test -f public/index.html || { echo "Falta public/index.html apos allure:report"; exit 1; }

      - name: Upload Allure HTML
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: allure-report-html
          path: target/site/allure-maven-plugin
          if-no-files-found: warn

      - name: Push para gh-pages
        if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
        uses: peaceiris/actions-gh-pages@4f9cc6602d3f66b9c108549d475ec49e8ef4d45e
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: ./public
          force_orphan: false
          enable_jekyll: false
